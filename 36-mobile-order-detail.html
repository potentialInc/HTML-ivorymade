<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Detail — Ivorymade</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
body {
font-family: 'Manrope', sans-serif;
background-color: #EEF3FD;
color: #181D27;
}
.hide-scrollbar::-webkit-scrollbar {
display: none;
}
.hide-scrollbar {
-ms-overflow-style: none;
scrollbar-width: none;
}
.phone-frame {
box-shadow: 0 25px 50px -12px rgba(30, 58, 95, 0.12);
}
</style></head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Mobile Screen Frame -->
    <div class="phone-frame relative w-full max-w-[390px] h-[844px] bg-[#EEF3FD] rounded-[2.5rem] overflow-hidden border border-[#E6E8EC] flex flex-col">
        
        <!-- Header -->
        <header class="shrink-0 bg-white h-[3.5rem] border-b border-[#E6E8EC] px-4 flex items-center justify-between z-20">
            <button class="w-[24px] h-[24px] flex items-center justify-start text-[#181D27]">
                <iconify-icon icon="solar:alt-arrow-left-linear" width="24" style="stroke-width: 1.5"></iconify-icon>
            </button>
            <h1 class="text-[1.125rem] font-semibold text-[#181D27] flex-1 text-center">Anterior Zirconia Crown</h1>
            <div class="flex justify-end">
                <span class="text-[0.75rem] font-medium text-[#2ABC73] bg-[#2ABC73]/10 px-2.5 py-1 rounded-full whitespace-nowrap">Design Ready</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto hide-scrollbar px-4 pt-4 pb-32">
            
            <!-- Order Info Card -->
            <div class="bg-white p-4 rounded-[0.75rem] border border-[#E6E8EC] space-y-4">
                <div class="flex justify-between items-start gap-4">
                    <span class="text-[0.75rem] font-medium text-[#535862] shrink-0">Case Name:</span>
                    <span class="text-[0.875rem] font-normal text-[#181D27] text-right">Anterior Zirconia Crown</span>
                </div>
                
                <div class="flex justify-between items-start gap-4">
                    <span class="text-[0.75rem] font-medium text-[#535862] shrink-0">Doctor:</span>
                    <span class="text-[0.875rem] font-normal text-[#181D27] text-right">Dr. Sarah Mitchell</span>
                </div>
                
                <div class="flex justify-between items-start gap-4">
                    <span class="text-[0.75rem] font-medium text-[#535862] shrink-0">Reference:</span>
                    <span class="text-[0.875rem] font-normal text-[#181D27] text-right">Upper Right #3 (Tooth 14)</span>
                </div>
                
                <div class="flex justify-between items-start gap-4">
                    <span class="text-[0.75rem] font-medium text-[#535862] shrink-0">Shipping Address:</span>
                    <span class="text-[0.875rem] font-normal text-[#181D27] text-right">456 Dental Plaza, Suite 200, Miami, FL 33101</span>
                </div>
                
                <div class="flex justify-between items-start gap-4">
                    <span class="text-[0.75rem] font-medium text-[#535862] shrink-0">Submitted:</span>
                    <span class="text-[0.875rem] font-normal text-[#181D27] text-right">March 3, 2026</span>
                </div>
            </div>

            <!-- Status Progress -->
            <div class="mt-4 px-1 space-y-3">
                <div class="w-full h-[0.25rem] bg-[#E6E8EC] rounded-full overflow-hidden">
                    <div class="w-[60%] h-full bg-[#6495ED] rounded-full"></div>
                </div>
                <p class="text-[0.75rem] font-medium text-[#29579A] text-center">Design Ready</p>
            </div>

            <!-- Action Buttons -->
            <div class="mt-8 space-y-3">
                <button class="w-full h-[3rem] bg-[#6495ED] text-white rounded-[0.5rem] font-medium text-[0.875rem] transition-active active:scale-[0.98]">
                    Review Design
                </button>
                
                <button class="w-full h-[3rem] border border-[#E6E8EC] bg-white text-[#535862] rounded-[0.5rem] font-medium text-[0.875rem] flex items-center justify-center gap-2 transition-active active:scale-[0.98]">
                    <iconify-icon icon="solar:camera-linear" width="20" style="stroke-width: 1.5"></iconify-icon>
                    Upload Image
                </button>
                
                <button class="w-full h-[3rem] border border-[#E6E8EC] bg-white text-[#535862] rounded-[0.5rem] font-medium text-[0.875rem] transition-active active:scale-[0.98]">
                    Edit Order
                </button>
            </div>
        </main>

        <!-- Bottom Tab Bar -->
        <nav class="absolute bottom-0 left-0 right-0 bg-white border-t border-[#E6E8EC] h-[3.5rem] px-6 pb-6 flex items-center justify-between z-30 box-content">
            <a href="./33-mobile-dashboard.html" class="flex flex-col items-center gap-1 text-[#8B95A1] pt-2">
                <iconify-icon icon="solar:home-2-linear" width="20" style="stroke-width: 1.5"></iconify-icon>
                <span class="text-[0.625rem] font-medium uppercase">Home</span>
            </a>
            <a href="./35-mobile-orders-list.html" class="flex flex-col items-center gap-1 text-[#29579A] pt-2">
                <iconify-icon icon="solar:clipboard-list-linear" width="20" style="stroke-width: 1.5"></iconify-icon>
                <span class="text-[0.625rem] font-semibold uppercase">Orders</span>
            </a>
            <a href="./39-mobile-chat.html" class="flex flex-col items-center gap-1 text-[#8B95A1] pt-2">
                <iconify-icon icon="solar:chat-round-dots-linear" width="20" style="stroke-width: 1.5"></iconify-icon>
                <span class="text-[0.625rem] font-medium uppercase">Chat</span>
            </a>
            <a href="./34-mobile-notifications.html" class="flex flex-col items-center gap-1 text-[#8B95A1] pt-2">
                <iconify-icon icon="solar:bell-linear" width="20" style="stroke-width: 1.5"></iconify-icon>
                <span class="text-[0.625rem] font-medium uppercase">Alerts</span>
            </a>
        </nav>

        <!-- Home Indicator -->
        <div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1 bg-[#181D27]/10 rounded-full z-40"></div>
    </div>



<script>
(function() {
  var links = document.querySelectorAll('a[href="#"], button');
  links.forEach(function(el) {
    var text = el.textContent.trim().toLowerCase();
    if (text.includes('home') || text.includes('dashboard')) {
      el.addEventListener('click', function(e) { e.preventDefault(); location.href = './33-mobile-dashboard.html'; });
    } else if (text.includes('order')) {
      el.addEventListener('click', function(e) { e.preventDefault(); location.href = './35-mobile-orders-list.html'; });
    } else if (text.includes('chat') || text.includes('message')) {
      el.addEventListener('click', function(e) { e.preventDefault(); location.href = './39-mobile-chat.html'; });
    } else if (text.includes('notification')) {
      el.addEventListener('click', function(e) { e.preventDefault(); location.href = './34-mobile-notifications.html'; });
    } else if (text.includes('payment') || text.includes('pay')) {
      el.addEventListener('click', function(e) { e.preventDefault(); location.href = './38-mobile-payment.html'; });
    }
  });
})();
</script>
</body></html>
