<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed | Ivorymade</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
<style>
body {
font-family: 'Inter', sans-serif;
-webkit-font-smoothing: antialiased;
color: #1E293B;
}
@keyframes scaleIn {
0% { transform: scale(0); opacity: 0; }
60% { transform: scale(1.1); }
100% { transform: scale(1); opacity: 1; }
}
@keyframes float {
0% { transform: translateY(0px); }
50% { transform: translateY(-10px); }
100% { transform: translateY(0px); }
}
.animate-scale-in {
animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
.confetti {
position: absolute;
width: 8px;
height: 8px;
border-radius: 2px;
pointer-events: none;
}
.bg-radial-glow {
background: radial-gradient(circle at center, rgba(30, 58, 95, 0.04) 0%, transparent 70%);
}
</style></head>
<body class="bg-[#F8F9FB] min-h-screen flex overflow-hidden">

    <!-- Left Sidebar -->
    <aside class="fixed inset-y-0 left-0 w-[280px] bg-white border-r border-[#E2E8F0] shadow-sm flex flex-col z-50">
        <div class="h-24 px-8 flex items-center">
            <span class="text-xl font-semibold tracking-tighter text-[#1E3A5F]">IVORYMADE</span>
        </div>
        
        <nav class="flex-1 px-4 space-y-1">
            <a href="#" class="flex items-center h-12 px-4 gap-3 rounded-lg text-[#64748B] hover:bg-[#F8F9FB] transition-all group">
                <iconify-icon icon="solar:widget-linear" width="20" class="group-hover:text-[#1E3A5F]"></iconify-icon>
                <span class="text-sm font-medium">Dashboard</span>
            </a>
            <a href="#" class="flex items-center h-12 px-4 gap-3 rounded-lg bg-[#1E3A5F]/5 text-[#1E3A5F] transition-all">
                <iconify-icon icon="solar:box-minimalistic-linear" width="20"></iconify-icon>
                <span class="text-sm font-semibold">Orders</span>
            </a>
            <a href="#" class="flex items-center h-12 px-4 gap-3 rounded-lg text-[#64748B] hover:bg-[#F8F9FB] transition-all group">
                <iconify-icon icon="solar:chat-round-line-linear" width="20" class="group-hover:text-[#1E3A5F]"></iconify-icon>
                <span class="text-sm font-medium">Messages</span>
            </a>
            <a href="#" class="flex items-center h-12 px-4 gap-3 rounded-lg text-[#64748B] hover:bg-[#F8F9FB] transition-all group">
                <iconify-icon icon="solar:settings-linear" width="20" class="group-hover:text-[#1E3A5F]"></iconify-icon>
                <span class="text-sm font-medium">Settings</span>
            </a>
        </nav>

        <div class="p-6 border-t border-[#E2E8F0]">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-[#C9A96E]/10 flex items-center justify-center text-[#C9A96E] text-xs font-semibold">JD</div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-semibold text-[#1E293B] truncate">Dr. Julianne Moore</p>
                    <p class="text-xs text-[#64748B] truncate">Premium Dental Studio</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 ml-[280px] relative flex items-center justify-center p-8 bg-radial-glow">
        
        <!-- Decorative Confetti/Dots -->
        <div class="absolute inset-0 overflow-hidden pointer-events-none">
            <div class="confetti bg-[#10B981] opacity-20" style="top: 20%; left: 15%; animation: float 4s ease-in-out infinite;"></div>
            <div class="confetti bg-[#C9A96E] opacity-20" style="top: 15%; right: 20%; animation: float 5s ease-in-out infinite 1s;"></div>
            <div class="confetti bg-[#3B82F6] opacity-20" style="bottom: 25%; left: 10%; animation: float 4.5s ease-in-out infinite 0.5s;"></div>
            <div class="confetti bg-[#F59E0B] opacity-20" style="bottom: 15%; right: 15%; animation: float 6s ease-in-out infinite 2s;"></div>
            <div class="w-2 h-2 rounded-full bg-[#1E3A5F] opacity-5 absolute" style="top: 40%; left: 5%;"></div>
            <div class="w-1.5 h-1.5 rounded-full bg-[#1E3A5F] opacity-5 absolute" style="top: 60%; right: 10%;"></div>
        </div>

        <!-- Confirmation Card -->
        <div class="w-full max-w-[480px] bg-white rounded-xl shadow-md border border-[#E2E8F0] p-8 relative z-10 flex flex-col items-center">
            
            <!-- Success Checkmark -->
            <div class="w-16 h-16 bg-[#10B981] rounded-full flex items-center justify-center text-white shadow-lg shadow-[#10B981]/20 animate-scale-in mb-4">
                <iconify-icon icon="solar:check-read-linear" width="32"></iconify-icon>
            </div>

            <h2 class="text-2xl font-semibold tracking-tight text-[#1E293B] text-center mb-3">Order Submitted Successfully!</h2>
            <p class="text-sm text-[#64748B] text-center leading-relaxed mb-8">Your order has been received and is being processed.</p>

            <!-- Order ID Section -->
            <div class="w-full space-y-2 mb-8 flex flex-col items-center">
                <span class="text-xs font-semibold text-[#64748B] uppercase tracking-wider">Order ID</span>
                <div class="flex items-center gap-3 bg-[#F8F9FB] px-5 py-3 rounded-lg border border-[#E2E8F0]">
                    <span class="font-mono text-xl font-semibold text-[#1E3A5F]">IB-428-7291</span>
                    <button class="flex items-center justify-center hover:text-[#1E3A5F] text-[#64748B] transition-colors group relative" title="Copy to clipboard">
                        <iconify-icon icon="solar:copy-linear" width="18"></iconify-icon>
                        <span class="absolute -top-10 left-1/2 -translate-x-1/2 bg-[#1E293B] text-white text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Copy to clipboard</span>
                    </button>
                </div>
            </div>

            <!-- QR Code Section -->
            <div class="w-full flex flex-col items-center gap-6 mb-8 pt-6 border-t border-[#F1F5F9]">
                <div class="p-2 border border-[#E2E8F0] rounded-xl bg-white shadow-sm">
                    <div class="w-[160px] h-[160px] bg-white rounded-lg flex items-center justify-center overflow-hidden">
                        <!-- Simulated QR Code SVG -->
                        <svg width="144" height="144" viewBox="0 0 144 144" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect width="144" height="144" fill="white"></rect>
                            <path d="M0 0H48V48H0V0ZM8 8V40H40V8H8ZM16 16H32V32H16V16ZM96 0H144V48H96V0ZM104 8V40H136V8H104ZM112 16H128V32H112V16ZM0 96H48V144H0V96ZM8 104V136H40V104H8ZM16 112H32V128H16V112Z" fill="#1E3A5F"></path>
                            <path d="M64 0H80V16H64V0ZM80 16H96V32H80V16ZM64 32H80V48H64V32ZM48 16H64V32H48V16ZM48 48H64V64H48V48ZM0 48H16V64H0V48ZM16 64H32V80H16V64ZM32 48H48V64H32V48ZM64 64H80V80H64V64ZM80 48H96V64H80V48ZM96 64H112V80H96V64ZM112 48H128V64H112V48ZM128 64H144V80H128V64ZM48 80H64V96H48V80ZM64 96H80V112H64V96ZM80 80H96V96H80V80ZM96 96H112V112H96V96ZM112 80H128V96H112V80ZM128 96H144V112H128V96ZM48 112H64V128H48V112ZM64 128H80V144H64V128ZM80 112H96V128H80V112ZM96 128H112V144H96V128ZM112 112H128V128H112V112ZM128 128H144V144H128V128ZM48 0H64V16H48V0Z" fill="#1E3A5F" fill-opacity="0.8"></path>
                        </svg>
                    </div>
                </div>
                <p class="text-xs text-[#64748B] italic">Scan to upload images for this order</p>
            </div>

            <!-- Buttons Section -->
            <div class="w-full space-y-3">
                <button class="w-full h-11 bg-[#1E3A5F] text-white text-sm font-semibold rounded-lg hover:bg-[#162a45] transition-all shadow-md active:scale-[0.98]">
                    View Order Details
                </button>
                <button class="w-full h-11 bg-white border border-[#E2E8F0] text-[#64748B] text-sm font-semibold rounded-lg hover:bg-[#F8F9FB] hover:text-[#1E3A5F] hover:border-[#1E3A5F] transition-all active:scale-[0.98]">
                    Submit Another Order
                </button>
            </div>

        </div>
    </main>


</body></html>
