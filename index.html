<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ivorymade | Digital Dental Lab Ordering</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
body {
font-family: 'Manrope', sans-serif;
-webkit-font-smoothing: antialiased;
-moz-osx-font-smoothing: grayscale;
}
.logo-tracking {
letter-spacing: -0.05em;
}
</style></head>
<body class="bg-gradient-to-b from-[#EEF3FD] to-[#E0EAFB] text-[#181D27] min-h-screen flex flex-col items-center justify-center selection:bg-[#E0EAFB] selection:text-[#29579A]">

    <!-- Main Content Container -->
    <main class="w-full max-w-[480px] px-6 flex flex-col items-center justify-center flex-grow">
        
        <!-- Brand Section -->
        <div class="text-center mb-8">
            <div class="flex flex-col items-center">
                <!-- Logo -->
                <div class="h-[64px] flex items-center justify-center mb-6">
                    <span class="logo-tracking text-4xl font-semibold uppercase flex items-center">
                        <span class="text-[#181D27]">ivorymade</span>
                    </span>
                </div>
                
                <!-- Headline -->
                <h1 class="text-3xl font-semibold text-[#181D27] tracking-tight mb-3">
                    Digital Dental Lab Ordering
                </h1>
                
                <!-- Subline -->
                <p class="text-base font-normal text-[#535862] max-w-[360px] leading-relaxed">
                    Submit orders, review designs, track shipments — all in one place
                </p>
            </div>
        </div>

        <!-- Action Buttons Section -->
        <div class="w-full max-w-[360px] space-y-4">
            <!-- Primary Action -->
            <button class="w-full h-[44px] bg-[#6495ED] hover:bg-[#3B76CE] text-white text-sm font-semibold rounded-[8px] shadow-md transition-all duration-200 flex items-center justify-center group">
                Sign Up
                <iconify-icon icon="solar:arrow-right-linear" stroke-width="1.5" class="ml-2 text-lg group-hover:translate-x-1 transition-transform"></iconify-icon>
            </button>
            
            <!-- Secondary Action -->
            <button class="w-full h-[44px] bg-transparent border border-[#6495ED] text-[#29579A] hover:bg-[#E0EAFB] text-sm font-semibold rounded-[8px] transition-all duration-200 flex items-center justify-center">
                Log In
            </button>
        </div>

        <!-- Trust Indicators (Subtle) -->
        <div class="mt-12 flex items-center space-x-6 grayscale opacity-40">
            <div class="flex items-center text-xs font-medium tracking-widest uppercase">
                <iconify-icon icon="solar:verified-check-linear" class="mr-1 text-sm"></iconify-icon>
                B2B Certified
            </div>
            <div class="flex items-center text-xs font-medium tracking-widest uppercase">
                <iconify-icon icon="solar:shield-check-linear" class="mr-1 text-sm"></iconify-icon>
                Secure
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full p-6 text-center">
        <p class="text-xs font-medium text-[#8B95A1] tracking-wide">
            © 2026 IVORYMADE. ALL RIGHTS RESERVED.
        </p>
    </footer>

    <!-- Decorative Elements -->
    <div class="fixed top-0 left-0 w-full h-1 bg-[#6495ED]"></div>
    <div class="fixed top-12 -left-24 w-64 h-64 bg-[#6495ED] opacity-[0.03] rounded-full blur-3xl pointer-events-none"></div>
    <div class="fixed bottom-12 -right-24 w-80 h-80 bg-[#6495ED] opacity-[0.03] rounded-full blur-3xl pointer-events-none"></div>



<script>
(function() {
  var buttons = document.querySelectorAll('button');
  buttons.forEach(function(btn) {
    var text = btn.textContent.trim();
    if (text.includes('Sign Up') || text.includes('Get Started') || text.includes('Register')) {
      btn.addEventListener('click', function() { location.href = './03-signup.html'; });
    } else if (text.includes('Log In') || text.includes('Login') || text.includes('Sign In')) {
      btn.addEventListener('click', function() { location.href = './02-login.html'; });
    }
  });
  var links = document.querySelectorAll('a');
  links.forEach(function(a) {
    var text = a.textContent.trim();
    if (a.href.endsWith('#') || a.getAttribute('href') === '#') {
      if (text.includes('Sign Up') || text.includes('Get Started')) {
        a.href = './03-signup.html';
      } else if (text.includes('Log In') || text.includes('Login')) {
        a.href = './02-login.html';
      }
    }
  });
})();
</script>
</body></html>
