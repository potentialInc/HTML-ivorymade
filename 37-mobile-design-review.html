<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Review — Ivorymade</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">
<style>
body {
font-family: 'Inter', sans-serif;
background-color: #F8F9FB;
color: #1E293B;
-webkit-font-smoothing: antialiased;
}
.hide-scrollbar::-webkit-scrollbar {
display: none;
}
.hide-scrollbar {
-ms-overflow-style: none;
scrollbar-width: none;
}
.animate-slow-spin {
animation: spin 3s linear infinite;
}
@keyframes spin {
from { transform: rotate(0deg); }
to { transform: rotate(360deg); }
}
.wireframe-pulse {
animation: pulse-lines 4s ease-in-out infinite;
}
@keyframes pulse-lines {
0%, 100% { opacity: 0.4; stroke-width: 1; }
50% { opacity: 0.8; stroke-width: 1.5; }
}
</style></head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Phone Container -->
    <div class="relative w-full max-w-[390px] h-[844px] bg-[#F8F9FB] rounded-[2.5rem] overflow-hidden border border-[#E2E8F0] shadow-2xl flex flex-col">
        
        <!-- Header Overlay -->
        <header class="absolute top-0 left-0 right-0 z-20 px-4 pt-12 pb-8 bg-gradient-to-b from-black/60 to-transparent flex items-center justify-between pointer-events-none">
            <button class="w-10 h-10 rounded-full bg-black/20 backdrop-blur-md flex items-center justify-center text-white pointer-events-auto active:scale-95 transition-transform">
                <iconify-icon icon="solar:alt-arrow-left-linear" width="24" style="stroke-width: 1.5"></iconify-icon>
            </button>
            <div class="text-center">
                <h2 class="text-sm font-semibold text-white tracking-wide">Anterior Zirconia Crown</h2>
                <p class="text-[0.625rem] text-white/70 font-medium uppercase tracking-widest">IB-428-7291</p>
            </div>
            <div class="w-10 h-10"></div> <!-- Spacer for symmetry -->
        </header>

        <!-- 3D Viewer Area (60%) -->
        <section class="relative h-[60%] bg-[#1E3A5F] overflow-hidden flex flex-col items-center justify-center">
            <!-- Simulated Wireframe Environment -->
            <div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(#C9A96E 0.5px, transparent 0.5px); background-size: 24px 24px;"></div>
            
            <!-- Wireframe Tooth Placeholder -->
            <div class="relative z-10 w-48 h-48 flex items-center justify-center">
                <svg viewBox="0 0 100 100" class="w-full h-full text-[#C9A96E] wireframe-pulse">
                    <path d="M50 10 L80 30 L80 70 L50 90 L20 70 L20 30 Z" fill="none" stroke="currentColor" stroke-dasharray="2 2"></path>
                    <path d="M50 10 L50 90 M20 30 L80 30 M20 70 L80 70" fill="none" stroke="currentColor" stroke-dasharray="4 4"></path>
                    <circle cx="50" cy="50" r="35" fill="none" stroke="currentColor" stroke-opacity="0.3"></circle>
                    <path d="M30 40 Q50 20 70 40 Q80 60 50 80 Q20 60 30 40" fill="none" stroke="currentColor"></path>
                </svg>
                
                <!-- Loading State Overlay -->
                <div class="absolute inset-0 flex flex-col items-center justify-center bg-[#1E3A5F]/40 backdrop-blur-[2px]">
                    <div class="w-8 h-8 border-2 border-[#C9A96E]/20 border-t-[#C9A96E] rounded-full animate-spin"></div>
                    <span class="mt-4 text-[0.75rem] font-medium text-white/80 tracking-wide">Loading design...</span>
                </div>
            </div>

            <!-- UI Hints -->
            <div class="absolute bottom-6 left-0 right-0 text-center">
                <p class="text-[0.75rem] text-white/50 font-medium tracking-tight">Pinch to zoom · Swipe to rotate</p>
            </div>

            <!-- Viewer Controls -->
            <div class="absolute right-4 top-1/2 -translate-y-1/2 flex flex-col gap-3">
                <button class="w-10 h-10 bg-white/10 backdrop-blur-md rounded-lg flex items-center justify-center text-white border border-white/10 active:bg-white/20">
                    <iconify-icon icon="solar:maximize-linear" width="20"></iconify-icon>
                </button>
                <button class="w-10 h-10 bg-white/10 backdrop-blur-md rounded-lg flex items-center justify-center text-white border border-white/10 active:bg-white/20">
                    <iconify-icon icon="solar:refresh-linear" width="20"></iconify-icon>
                </button>
            </div>
        </section>

        <!-- Review Panel (40%) -->
        <section class="h-[40%] bg-white rounded-t-[1.5rem] -mt-6 z-30 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] flex flex-col">
            <!-- Drag Handle -->
            <div class="w-full flex justify-center py-3">
                <div class="w-10 h-1 bg-[#94A3B8]/30 rounded-full"></div>
            </div>

            <div class="flex-1 overflow-y-auto px-5 pb-6 space-y-5 hide-scrollbar">
                <!-- Technician Comment -->
                <div class="bg-[#F0F2F5] p-3.5 rounded-xl border-l-4 border-[#C9A96E]">
                    <div class="flex items-center gap-2 mb-1.5">
                        <span class="text-[0.625rem] font-semibold text-[#64748B] uppercase tracking-wider">Technician Note</span>
                    </div>
                    <p class="text-sm leading-relaxed text-[#1E293B]">
                        Crown anatomy finalized. Margin adjusted per Dr. Mitchell's notes. Ready for approval.
                    </p>
                </div>

                <!-- Revision Input -->
                <div class="relative">
                    <textarea placeholder="Describe revisions..." class="w-full min-h-[80px] p-4 pr-12 text-sm bg-white border border-[#E2E8F0] rounded-xl focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]/5 focus:border-[#1E3A5F] placeholder:text-[#94A3B8] resize-none"></textarea>
                    <button class="absolute right-3 top-3 w-8 h-8 flex items-center justify-center text-[#64748B] hover:text-[#1E3A5F] active:scale-90 transition-all">
                        <iconify-icon icon="solar:microphone-3-linear" width="22"></iconify-icon>
                    </button>
                </div>

                <!-- Action Buttons -->
                <div class="space-y-3 pt-2">
                    <button class="w-full h-12 bg-[#10B981] text-white rounded-xl font-semibold text-sm flex items-center justify-center gap-2 shadow-lg shadow-[#10B981]/20 active:scale-[0.98] transition-all">
                        <iconify-icon icon="solar:check-circle-linear" width="20"></iconify-icon>
                        Approve Design
                    </button>
                    
                    <button class="w-full h-12 border-2 border-[#F59E0B] text-[#F59E0B] rounded-xl font-semibold text-sm flex items-center justify-center gap-2 active:bg-[#F59E0B]/5 active:scale-[0.98] transition-all">
                        <iconify-icon icon="solar:chat-line-linear" width="20"></iconify-icon>
                        Request Revision
                    </button>

                    <button class="w-full flex items-center justify-center gap-2 py-2 text-sm font-medium text-[#1E3A5F] active:opacity-60 transition-opacity">
                        <iconify-icon icon="solar:camera-linear" width="18"></iconify-icon>
                        Upload Photo
                    </button>
                </div>
            </div>
        </section>

        <!-- Home Indicator -->
        <div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1 bg-[#1E293B]/10 rounded-full z-40"></div>
    </div>



<script>
(function() {
  var links = document.querySelectorAll('a[href="#"], button');
  links.forEach(function(el) {
    var text = el.textContent.trim().toLowerCase();
    if (text.includes('home') || text.includes('dashboard')) {
      el.addEventListener('click', function(e) { e.preventDefault(); location.href = './33-mobile-dashboard.html'; });
    } else if (text.includes('order')) {
      el.addEventListener('click', function(e) { e.preventDefault(); location.href = './35-mobile-orders-list.html'; });
    } else if (text.includes('chat') || text.includes('message')) {
      el.addEventListener('click', function(e) { e.preventDefault(); location.href = './39-mobile-chat.html'; });
    } else if (text.includes('notification')) {
      el.addEventListener('click', function(e) { e.preventDefault(); location.href = './34-mobile-notifications.html'; });
    } else if (text.includes('payment') || text.includes('pay')) {
      el.addEventListener('click', function(e) { e.preventDefault(); location.href = './38-mobile-payment.html'; });
    }
  });
})();
</script>
</body></html>
