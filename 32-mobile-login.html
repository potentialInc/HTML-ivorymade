<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Ivorymade</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
<style>
body {
font-family: 'Inter', sans-serif;
-webkit-font-smoothing: antialiased;
background-color: #F8F9FB;
}
.phone-frame {
box-shadow: 0 25px 50px -12px rgba(30, 58, 95, 0.15);
}
input:focus {
outline: none;
border-color: #1E3A5F;
box-shadow: 0 0 0 1px #1E3A5F;
}
</style></head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Mobile Screen Container -->
    <div class="phone-frame w-full max-w-[390px] min-h-[844px] bg-white rounded-[2.5rem] overflow-hidden flex flex-col relative border border-[#E2E8F0]">
        
        <!-- Status Bar Mockup -->
        <div class="h-11 px-8 flex justify-between items-center text-[#1E293B]">
            <span class="text-[0.875rem] font-medium">9:41</span>
            <div class="flex gap-1.5 items-center">
                <iconify-icon icon="solar:transmission-linear" width="18"></iconify-icon>
                <iconify-icon icon="solar:wi-fi-router-linear" width="18"></iconify-icon>
                <iconify-icon icon="solar:battery-full-linear" width="18"></iconify-icon>
            </div>
        </div>

        <!-- Main Content Safe Area -->
        <div class="flex-1 px-6 pt-12 pb-8 flex flex-col">
            
            <!-- Logo + Branding -->
            <header class="text-center mb-12">
                <h1 class="text-[1.75rem] font-semibold tracking-tighter text-[#1E3A5F] leading-none mb-2">IVORYMADE</h1>
                <p class="text-[0.75rem] text-[#64748B] font-medium uppercase tracking-widest">Dental Lab Portal</p>
            </header>

            <!-- Login Form -->
            <form class="space-y-4 mb-6">
                <div class="relative group">
                    <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-[#94A3B8]">
                        <iconify-icon icon="solar:letter-linear" width="20" style="stroke-width: 1.5"></iconify-icon>
                    </div>
                    <input type="text" placeholder="Email or phone number" class="w-full h-12 pl-11 pr-4 bg-[#F8F9FB] border border-[#E2E8F0] rounded-[0.75rem] text-[0.875rem] text-[#1E293B] placeholder-[#94A3B8] transition-all">
                </div>

                <div class="relative group">
                    <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-[#94A3B8]">
                        <iconify-icon icon="solar:lock-password-linear" width="20" style="stroke-width: 1.5"></iconify-icon>
                    </div>
                    <input type="password" placeholder="Password" class="w-full h-12 pl-11 pr-12 bg-[#F8F9FB] border border-[#E2E8F0] rounded-[0.75rem] text-[0.875rem] text-[#1E293B] placeholder-[#94A3B8] transition-all">
                    <button type="button" class="absolute inset-y-0 right-4 flex items-center text-[#94A3B8] hover:text-[#64748B]">
                        <iconify-icon icon="solar:eye-linear" width="20" style="stroke-width: 1.5"></iconify-icon>
                    </button>
                </div>

                <button type="submit" class="w-full h-12 mt-2 bg-[#1E3A5F] hover:bg-[#1E3A5F]/95 text-white rounded-[0.75rem] text-[1rem] font-medium transition-transform active:scale-[0.98] shadow-lg shadow-[#1E3A5F]/10">
                    Log In
                </button>
            </form>

            <!-- Divider -->
            <div class="flex items-center gap-4 my-6">
                <div class="flex-1 h-px bg-[#E2E8F0]"></div>
                <span class="text-[0.75rem] text-[#94A3B8] font-medium uppercase tracking-wider">or</span>
                <div class="flex-1 h-px bg-[#E2E8F0]"></div>
            </div>

            <!-- Biometric Login -->
            <div class="flex flex-col items-center gap-3">
                <button class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white border border-[#E2E8F0] text-[#1E3A5F] shadow-sm hover:border-[#1E3A5F]/30 transition-colors">
                    <iconify-icon icon="solar:fingerprint-linear" width="32" style="stroke-width: 1.5"></iconify-icon>
                </button>
                <button class="text-[0.875rem] font-medium text-[#1E3A5F] hover:opacity-80">Use Face ID</button>
            </div>

            <!-- Footer Links -->
            <div class="mt-auto flex flex-col items-center gap-6">
                <a href="#" class="text-[0.875rem] font-medium text-[#1E3A5F] hover:underline underline-offset-4">Forgot Password?</a>
                
                <!-- Home Indicator Mockup -->
                <div class="w-32 h-1 bg-[#1E293B]/10 rounded-full mt-4"></div>
            </div>

        </div>
    </div>


</body></html>
