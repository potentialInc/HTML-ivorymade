<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account | Ivorymade</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
body {
font-family: 'Manrope', sans-serif;
-webkit-font-smoothing: antialiased;
}
.logo-tracking {
letter-spacing: -0.05em;
}
input:focus {
outline: none;
border-color: #6495ED;
box-shadow: 0 0 0 1px #6495ED;
}
.input-error {
border-color: #E82E29 !important;
}
.strength-segment {
height: 4px;
flex: 1;
border-radius: 2px;
background-color: #E6E8EC;
transition: all 0.3s ease;
}
</style></head>
<body class="bg-[#EEF3FD] text-[#181D27] min-h-screen flex items-center justify-center py-12 px-6">

    <div class="w-full max-w-[480px] bg-white rounded-[12px] shadow-md p-8">
        <!-- Logo Section -->
        <div class="flex justify-center mb-8">
            <span class="logo-tracking text-3xl font-medium uppercase flex items-center h-[48px]">
                <span class="text-[#181D27]">ivorymade</span>
            </span>
        </div>

        <!-- Heading Section -->
        <div class="text-center mb-6">
            <h2 class="text-2xl font-medium text-[#181D27] tracking-tight">Create Your Account</h2>
        </div>

        <!-- Form Section -->
        <form class="space-y-4" onsubmit="return false;">
            
            <!-- Email Field -->
            <div class="space-y-1.5">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <iconify-icon icon="solar:letter-linear" width="20" height="20" class="text-[#535862]" stroke-width="1.5"></iconify-icon>
                    </div>
                    <input type="email" placeholder="Email address" class="w-full h-[44px] pl-10 pr-4 bg-white border border-[#E6E8EC] rounded-[8px] text-sm transition-all placeholder:text-[#8B95A1]">
                </div>
            </div>

            <!-- Confirm Email Field (Shown with Error State as requested) -->
            <div class="space-y-1.5">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <iconify-icon icon="solar:letter-linear" width="20" height="20" class="text-[#535862]" stroke-width="1.5"></iconify-icon>
                    </div>
                    <input type="email" placeholder="Confirm email address" class="w-full h-[44px] pl-10 pr-4 bg-white border border-[#E6E8EC] rounded-[8px] text-sm transition-all placeholder:text-[#8B95A1] input-error">
                </div>
                <p class="text-xs text-red-500 px-1">Email addresses do not match</p>
            </div>

            <!-- Password Field -->
            <div class="space-y-2">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <iconify-icon icon="solar:lock-password-linear" width="20" height="20" class="text-[#535862]" stroke-width="1.5"></iconify-icon>
                    </div>
                    <input type="password" id="passwordInput" placeholder="Password" class="w-full h-[44px] px-10 bg-white border border-[#E6E8EC] rounded-[8px] text-sm transition-all placeholder:text-[#8B95A1]">
                    <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center text-[#535862] hover:text-[#29579A]">
                        <iconify-icon icon="solar:eye-linear" width="20" height="20" stroke-width="1.5"></iconify-icon>
                    </button>
                </div>
                
                <!-- Password Strength Indicator -->
                <div class="flex gap-1.5 px-0.5">
                    <div class="strength-segment bg-red-500"></div>
                    <div class="strength-segment bg-orange-400"></div>
                    <div class="strength-segment"></div>
                    <div class="strength-segment"></div>
                </div>
                <p class="text-xs text-[#8B95A1]">Min 8 characters, 1 uppercase, 1 lowercase, 1 special character</p>
            </div>

            <!-- Confirm Password Field -->
            <div class="space-y-1.5">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <iconify-icon icon="solar:lock-password-linear" width="20" height="20" class="text-[#535862]" stroke-width="1.5"></iconify-icon>
                    </div>
                    <input type="password" placeholder="Confirm password" class="w-full h-[44px] px-10 bg-white border border-[#E6E8EC] rounded-[8px] text-sm transition-all placeholder:text-[#8B95A1]">
                    <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center text-[#535862] hover:text-[#29579A]">
                        <iconify-icon icon="solar:eye-linear" width="20" height="20" stroke-width="1.5"></iconify-icon>
                    </button>
                </div>
            </div>

            <!-- Phone Number Field -->
            <div class="space-y-1.5">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <iconify-icon icon="solar:phone-linear" width="20" height="20" class="text-[#535862]" stroke-width="1.5"></iconify-icon>
                    </div>
                    <input type="tel" placeholder="Phone number" class="w-full h-[44px] pl-10 pr-20 bg-white border border-[#E6E8EC] rounded-[8px] text-sm transition-all placeholder:text-[#8B95A1]">
                    <div class="absolute inset-y-0 right-2 flex items-center">
                        <button type="button" class="h-[28px] px-3 text-xs font-medium text-[#29579A] border border-[#6495ED] rounded-[6px] hover:bg-[#F0F4F8] transition-colors">
                            Verify
                        </button>
                    </div>
                </div>
            </div>

            <!-- Signup Button -->
            <div class="pt-2">
                <button disabled="" class="w-full h-[44px] bg-[#6495ED] opacity-50 text-white text-sm font-medium rounded-[8px] transition-all duration-200 shadow-sm flex items-center justify-center cursor-not-allowed">
                    Create Account
                </button>
            </div>
        </form>

        <!-- Login Link -->
        <div class="mt-6 text-center">
            <p class="text-sm text-[#535862]">
                Already registered? 
                <a href="./02-login.html" class="text-[#29579A] font-medium hover:underline decoration-2 underline-offset-4 ml-1">Log In</a>
            </p>
        </div>
    </div>



<script>
(function() {
  var form = document.querySelector('form');
  if (form) {
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      location.href = './04-email-verification.html';
    });
  }
})();
</script>
</body></html>
