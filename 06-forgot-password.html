<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password | Ivorymade</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
body {
font-family: 'Manrope', sans-serif;
-webkit-font-smoothing: antialiased;
background-color: #EEF3FD;
}
.auth-card {
box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
}
.input-field {
height: 44px;
transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.input-field:focus-within {
border-color: #6495ED;
box-shadow: 0 0 0 1px #6495ED;
}
.logo-text {
letter-spacing: -0.05em;
}
.btn-transition {
transition: all 0.2s ease;
}
</style></head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 text-[#181D27]">

    <!-- Logo Branding -->
    <div class="mb-8">
        <span class="logo-text text-xl font-semibold uppercase flex items-center">
            <span class="text-[#181D27]">ivorymade</span>
        </span>
    </div>

    <!-- Auth Container -->
    <div class="w-full max-w-[400px]">
        
        <!-- FORGOT PASSWORD STATE -->
        <div id="forgot-password-view" class="auth-card bg-white rounded-[12px] p-8">
            <div class="flex flex-col items-center text-center">
                <div class="mb-6 flex items-center justify-center w-12 h-12 rounded-full bg-[#F1F5F9]">
                    <iconify-icon icon="solar:lock-password-linear" width="28" height="28" class="text-[#8B95A1]" style="stroke-width: 1.5"></iconify-icon>
                </div>
                
                <h2 class="text-2xl font-semibold tracking-tight text-[#181D27] mb-2">Forgot Password?</h2>
                <p class="text-sm text-[#535862] mb-8 leading-relaxed">Enter your email and we'll send you a reset link</p>
            </div>

            <form id="reset-form" onsubmit="event.preventDefault(); showSuccess();" class="space-y-4">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                        <iconify-icon icon="solar:letter-linear" width="18" height="18" class="text-[#8B95A1]"></iconify-icon>
                    </div>
                    <input type="email" required="" placeholder="Email address" class="input-field block w-full pl-10 pr-4 bg-white border border-[#E6E8EC] rounded-[8px] text-sm focus:outline-none placeholder:text-[#8B95A1]">
                </div>

                <button type="submit" class="btn-transition w-full h-11 mt-6 bg-[#6495ED] text-white rounded-[8px] text-sm font-medium hover:bg-[#162a45] active:scale-[0.98]">
                    Send Reset Link
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="./02-login.html" class="text-sm font-medium text-[#535862] hover:text-[#29579A] transition-colors flex items-center justify-center gap-2">
                    <iconify-icon icon="solar:alt-arrow-left-linear" width="16" height="16"></iconify-icon>
                    Back to Login
                </a>
            </div>
        </div>

        <!-- SUCCESS STATE (Hidden by default) -->
        <div id="success-view" class="auth-card bg-white rounded-[12px] p-8 hidden">
            <div class="flex flex-col items-center text-center">
                <div class="mb-6 flex items-center justify-center w-12 h-12 rounded-full bg-[#ECFDF5]">
                    <iconify-icon icon="solar:check-circle-linear" width="28" height="28" class="text-[#2ABC73]" style="stroke-width: 1.5"></iconify-icon>
                </div>
                
                <h2 class="text-2xl font-semibold tracking-tight text-[#181D27] mb-2">Check Your Email</h2>
                <p class="text-sm text-[#535862] mb-8 leading-relaxed">We've sent a password reset link to your email</p>

                <button onclick="location.reload()" class="btn-transition w-full h-11 border border-[#E6E8EC] text-[#181D27] rounded-[8px] text-sm font-medium hover:bg-[#EEF3FD] active:scale-[0.98]">
                    Back to Login
                </button>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <div class="mt-8">
        <p class="text-xs text-[#8B95A1]">
            © 2024 Ivorymade Dental Laboratory.
        </p>
    </div>

    <script>
        function showSuccess() {
            const forgotView = document.getElementById('forgot-password-view');
            const successView = document.getElementById('success-view');
            
            forgotView.classList.add('hidden');
            successView.classList.remove('hidden');
        }
    </script>

</body></html>
