<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Ivorymade | Collaborator Sign Up</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">
<style>
body {
font-family: 'Inter', sans-serif;
-webkit-font-smoothing: antialiased;
background-color: #F8F9FB;
}
.input-focus:focus {
outline: none;
border-color: #1E3A5F;
box-shadow: 0 0 0 1px #1E3A5F;
}
.logo-tracking {
letter-spacing: -0.05em;
}
</style></head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 text-[#1E293B]">

    <div class="w-full max-w-[440px]">
        <!-- Logo Area -->
        <div class="flex justify-center mb-8">
            <span class="logo-tracking text-2xl font-medium uppercase text-[#1E3A5F]">
                Ivorymade
            </span>
        </div>

        <!-- Invitation Card -->
        <div class="bg-white rounded-[12px] p-8 shadow-md border border-[#E2E8F0]">
            
            <!-- Invitation Header -->
            <div class="text-center mb-8">
                <p class="text-base text-[#64748B] mb-1">You've been invited to join</p>
                <h2 class="text-2xl font-medium tracking-tight text-[#1E3A5F] mb-1">Sunrise Dental Clinic</h2>
                <p class="text-xs text-[#94A3B8]">Invited by Dr. Sarah Johnson</p>
            </div>

            <form class="space-y-4">
                <!-- Pre-filled Info Group -->
                <div class="space-y-3 pb-2">
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <iconify-icon icon="solar:lock-linear" width="18" height="18" class="text-[#94A3B8]"></iconify-icon>
                        </div>
                        <input type="email" readonly="" value="john@example.com" class="h-11 block w-full pl-10 pr-4 bg-[#F8F9FB] border border-[#E2E8F0] rounded-[8px] text-sm text-[#64748B] cursor-not-allowed">
                    </div>
                    <div class="flex">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-normal bg-[#3B82F6]/10 text-[#3B82F6] border border-[#3B82F6]/20">
                            Associate Dentist
                        </span>
                    </div>
                </div>

                <!-- Name Fields Row -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <input type="text" placeholder="First Name" class="input-focus h-11 block w-full px-3.5 bg-white border border-[#E2E8F0] rounded-[8px] text-sm placeholder:text-[#94A3B8]">
                    </div>
                    <div class="space-y-1.5">
                        <input type="text" placeholder="Last Name" class="input-focus h-11 block w-full px-3.5 bg-white border border-[#E2E8F0] rounded-[8px] text-sm placeholder:text-[#94A3B8]">
                    </div>
                </div>

                <!-- Password Fields -->
                <div class="space-y-4">
                    <div class="space-y-2">
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                <iconify-icon icon="solar:lock-password-linear" width="18" height="18" class="text-[#94A3B8]"></iconify-icon>
                            </div>
                            <input type="password" id="password" placeholder="Create Password" class="input-focus h-11 block w-full pl-10 pr-10 bg-white border border-[#E2E8F0] rounded-[8px] text-sm placeholder:text-[#94A3B8]">
                            <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center text-[#94A3B8] hover:text-[#1E293B]">
                                <iconify-icon icon="solar:eye-linear" width="18" height="18"></iconify-icon>
                            </button>
                        </div>
                        <!-- Strength Indicator -->
                        <div class="flex gap-1 h-1 px-0.5">
                            <div class="flex-1 rounded-full bg-[#10B981]"></div>
                            <div class="flex-1 rounded-full bg-[#10B981]"></div>
                            <div class="flex-1 rounded-full bg-[#E2E8F0]"></div>
                            <div class="flex-1 rounded-full bg-[#E2E8F0]"></div>
                        </div>
                        <p class="text-xs text-[#94A3B8]">Min 8 characters, include numbers &amp; symbols</p>
                    </div>

                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <iconify-icon icon="solar:lock-password-linear" width="18" height="18" class="text-[#94A3B8]"></iconify-icon>
                        </div>
                        <input type="password" placeholder="Confirm Password" class="input-focus h-11 block w-full pl-10 pr-10 bg-white border border-[#E2E8F0] rounded-[8px] text-sm placeholder:text-[#94A3B8]">
                        <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center text-[#94A3B8] hover:text-[#1E293B]">
                            <iconify-icon icon="solar:eye-linear" width="18" height="18"></iconify-icon>
                        </button>
                    </div>
                </div>

                <!-- Action Button -->
                <div class="pt-2">
                    <button type="submit" class="w-full h-11 bg-[#1E3A5F] hover:bg-[#162a45] text-white text-sm font-medium rounded-[8px] transition-all active:scale-[0.99] flex items-center justify-center gap-2">
                        Complete Setup
                    </button>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <div class="mt-8 text-center">
            <p class="text-xs text-[#94A3B8]">
                By completing setup, you agree to Ivorymade's 
                <a href="#" class="text-[#1E3A5F] hover:underline">Terms of Service</a>
            </p>
        </div>
    </div>


</body></html>
