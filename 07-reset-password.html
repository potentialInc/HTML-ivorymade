<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | Ivorymade</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">
<style>
body {
font-family: 'Inter', sans-serif;
-webkit-font-smoothing: antialiased;
background-color: #F8F9FB;
}
.auth-card {
box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
}
.input-field {
transition: all 0.2s ease;
}
.input-field:focus {
border-color: #1E3A5F;
box-shadow: 0 0 0 1px #1E3A5F;
}
.logo-text {
letter-spacing: -0.05em;
}
.strength-segment {
transition: all 0.3s ease;
}
</style></head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 text-[#1E293B]">

    <!-- Logo -->
    <div class="mb-8">
        <span class="logo-text text-xl font-semibold uppercase flex items-center">
            <span class="text-[#1E3A5F]">Ivory</span>
            <span class="text-[#64748B]">made</span>
        </span>
    </div>

    <!-- Main Container -->
    <div class="w-full max-w-[400px]">
        
        <!-- RESET FORM VIEW -->
        <div id="reset-view" class="auth-card bg-white rounded-[12px] p-8">
            <div class="flex flex-col items-center text-center mb-8">
                <div class="mb-4 flex items-center justify-center w-12 h-12 rounded-full bg-[#F1F5F9]">
                    <iconify-icon icon="solar:key-linear" width="28" height="28" class="text-[#1E3A5F]" style="stroke-width: 1.5"></iconify-icon>
                </div>
                <h2 class="text-2xl font-semibold tracking-tight text-[#1E293B]">Reset Password</h2>
            </div>

            <form onsubmit="event.preventDefault(); showSuccess();" class="space-y-4">
                <!-- New Password -->
                <div class="space-y-2">
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <iconify-icon icon="solar:lock-password-linear" width="18" height="18" class="text-[#94A3B8]"></iconify-icon>
                        </div>
                        <input type="password" id="new-password" required="" placeholder="New Password" class="input-field h-11 block w-full pl-10 pr-10 bg-white border border-[#E2E8F0] rounded-[8px] text-sm focus:outline-none placeholder:text-[#94A3B8]">
                        <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center text-[#94A3B8] hover:text-[#1E293B]">
                            <iconify-icon icon="solar:eye-linear" width="18" height="18"></iconify-icon>
                        </button>
                    </div>
                    
                    <!-- Strength Indicator -->
                    <div class="flex gap-1.5 h-1 px-0.5">
                        <div class="strength-segment flex-1 rounded-full bg-[#EF4444]"></div>
                        <div class="strength-segment flex-1 rounded-full bg-[#F97316]"></div>
                        <div class="strength-segment flex-1 rounded-full bg-[#EAB308]"></div>
                        <div class="strength-segment flex-1 rounded-full bg-[#10B981]"></div>
                    </div>
                    <p class="text-xs text-[#94A3B8] leading-tight">
                        Min 8 characters, 1 uppercase, 1 lowercase, 1 special character
                    </p>
                </div>

                <!-- Confirm Password -->
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                        <iconify-icon icon="solar:lock-password-linear" width="18" height="18" class="text-[#94A3B8]"></iconify-icon>
                    </div>
                    <input type="password" required="" placeholder="Confirm Password" class="input-field h-11 block w-full pl-10 pr-10 bg-white border border-[#E2E8F0] rounded-[8px] text-sm focus:outline-none placeholder:text-[#94A3B8]">
                    <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center text-[#94A3B8] hover:text-[#1E293B]">
                        <iconify-icon icon="solar:eye-linear" width="18" height="18"></iconify-icon>
                    </button>
                </div>

                <button type="submit" class="w-full h-11 mt-6 bg-[#1E3A5F] text-white rounded-[8px] text-sm font-medium hover:bg-[#162a45] transition-all active:scale-[0.98]">
                    Reset Password
                </button>
            </form>
        </div>

        <!-- SUCCESS VIEW (Hidden) -->
        <div id="success-view" class="auth-card bg-white rounded-[12px] p-8 hidden">
            <div class="flex flex-col items-center text-center">
                <div class="mb-6 flex items-center justify-center w-12 h-12 rounded-full bg-[#ECFDF5]">
                    <iconify-icon icon="solar:check-circle-linear" width="28" height="28" class="text-[#10B981]" style="stroke-width: 1.5"></iconify-icon>
                </div>
                
                <h2 class="text-2xl font-semibold tracking-tight text-[#1E293B] mb-2">Password Updated Successfully</h2>
                <p class="text-sm text-[#64748B] mb-8 leading-relaxed">You can now log in with your new password</p>

                <button onclick="window.location.reload()" class="w-full h-11 bg-[#1E3A5F] text-white rounded-[8px] text-sm font-medium hover:bg-[#162a45] transition-all active:scale-[0.98]">
                    Go to Login
                </button>
            </div>
        </div>

    </div>

    <!-- Simple Footer -->
    <div class="mt-8">
        <p class="text-xs text-[#94A3B8]">
            © 2024 Ivorymade Dental Laboratory.
        </p>
    </div>

    <script>
        function showSuccess() {
            document.getElementById('reset-view').classList.add('hidden');
            document.getElementById('success-view').classList.remove('hidden');
        }
    </script>

</body></html>
