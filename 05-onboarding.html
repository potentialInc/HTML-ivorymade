<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding | Ivorymade</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">
<style>
body {
font-family: 'Inter', sans-serif;
-webkit-font-smoothing: antialiased;
background-color: #F8F9FB;
}
.step-dot {
transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.input-field {
height: 44px;
border: 1px solid #E2E8F0;
border-radius: 8px;
padding: 0 16px;
width: 100%;
transition: all 0.2s;
color: #1E293B;
font-size: 0.875rem;
}
.input-field:focus {
outline: none;
border-color: #1E3A5F;
box-shadow: 0 0 0 1px #1E3A5F;
}
.specialty-card {
cursor: pointer;
transition: all 0.2s;
border: 1px solid #E2E8F0;
}
.specialty-radio:checked + .specialty-card {
border-color: #1E3A5F;
background-color: #EBF2FA;
}
.logo-text {
letter-spacing: -0.05em;
}
</style></head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 text-[#1E293B]">

    <!-- Logo -->
    <div class="mb-10">
        <span class="logo-text text-xl font-semibold uppercase flex items-center">
            <span class="text-[#1E3A5F]">Ivory</span>
            <span class="text-[#C9A96E]">made</span>
        </span>
    </div>

    <!-- Main Onboarding Card -->
    <div class="w-full max-w-[520px] bg-white rounded-[12px] shadow-md p-8">
        
        <!-- Step Indicator -->
        <div class="flex flex-col items-center mb-10">
            <div class="flex items-center gap-3 mb-3">
                <div id="dot-1" class="step-dot w-[10px] h-[10px] rounded-full bg-[#1E3A5F]"></div>
                <div id="dot-2" class="step-dot w-[10px] h-[10px] rounded-full bg-[#E2E8F0]"></div>
                <div id="dot-3" class="step-dot w-[10px] h-[10px] rounded-full bg-[#E2E8F0]"></div>
                <div id="dot-4" class="step-dot w-[10px] h-[10px] rounded-full bg-[#E2E8F0]"></div>
            </div>
            <span id="step-label" class="text-xs font-medium text-[#94A3B8] uppercase tracking-wider">Step 1 of 4</span>
        </div>

        <form id="onboarding-form">
            <!-- STEP 1: Office Information -->
            <div id="step-1-content" class="step-content">
                <h2 class="text-2xl font-semibold tracking-tight mb-8">Tell us about your office</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-[#64748B] mb-1.5 ml-1">Office Name</label>
                        <input type="text" class="input-field" placeholder="e.g. Sunset Dental Clinic">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-[#64748B] mb-1.5 ml-1">Office Phone Number</label>
                        <input type="tel" class="input-field" placeholder="(555) 000-0000">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-[#64748B] mb-1.5 ml-1">Office Address</label>
                        <input type="text" class="input-field" placeholder="Street address, City, Zip">
                    </div>
                </div>
            </div>

            <!-- STEP 2: Name (Hidden) -->
            <div id="step-2-content" class="step-content hidden">
                <h2 class="text-2xl font-semibold tracking-tight mb-8">What's your name?</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-[#64748B] mb-1.5 ml-1">First Name</label>
                        <input type="text" class="input-field" placeholder="John">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-[#64748B] mb-1.5 ml-1">Last Name</label>
                        <input type="text" class="input-field" placeholder="Doe">
                    </div>
                </div>
            </div>

            <!-- STEP 3: Specialty (Hidden) -->
            <div id="step-3-content" class="step-content hidden">
                <h2 class="text-2xl font-semibold tracking-tight mb-8">What's your specialty?</h2>
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                    <!-- General Dentist -->
                    <label class="relative block">
                        <input type="radio" name="specialty" class="specialty-radio absolute opacity-0" checked="">
                        <div class="specialty-card w-full h-[80px] rounded-[8px] flex flex-col items-center justify-center gap-2">
                            <iconify-icon icon="solar:medical-kit-linear" width="20" height="20" class="text-[#1E3A5F]"></iconify-icon>
                            <span class="text-xs font-medium">General Dentist</span>
                        </div>
                    </label>
                    <!-- Prosthodontist -->
                    <label class="relative block">
                        <input type="radio" name="specialty" class="specialty-radio absolute opacity-0">
                        <div class="specialty-card w-full h-[80px] rounded-[8px] flex flex-col items-center justify-center gap-2">
                            <iconify-icon icon="solar:tooth-linear" width="20" height="20" class="text-[#1E3A5F]"></iconify-icon>
                            <span class="text-xs font-medium">Prosthodontist</span>
                        </div>
                    </label>
                    <!-- Oral Surgeon -->
                    <label class="relative block">
                        <input type="radio" name="specialty" class="specialty-radio absolute opacity-0">
                        <div class="specialty-card w-full h-[80px] rounded-[8px] flex flex-col items-center justify-center gap-2">
                            <iconify-icon icon="solar:scissors-square-linear" width="20" height="20" class="text-[#1E3A5F]"></iconify-icon>
                            <span class="text-xs font-medium">Oral Surgeon</span>
                        </div>
                    </label>
                    <!-- Periodontist -->
                    <label class="relative block">
                        <input type="radio" name="specialty" class="specialty-radio absolute opacity-0">
                        <div class="specialty-card w-full h-[80px] rounded-[8px] flex flex-col items-center justify-center gap-2">
                            <iconify-icon icon="solar:shield-check-linear" width="20" height="20" class="text-[#1E3A5F]"></iconify-icon>
                            <span class="text-xs font-medium">Periodontist</span>
                        </div>
                    </label>
                    <!-- Endodontist -->
                    <label class="relative block">
                        <input type="radio" name="specialty" class="specialty-radio absolute opacity-0">
                        <div class="specialty-card w-full h-[80px] rounded-[8px] flex flex-col items-center justify-center gap-2">
                            <iconify-icon icon="solar:pulse-linear" width="20" height="20" class="text-[#1E3A5F]"></iconify-icon>
                            <span class="text-xs font-medium">Endodontist</span>
                        </div>
                    </label>
                    <!-- Other -->
                    <label class="relative block">
                        <input type="radio" name="specialty" class="specialty-radio absolute opacity-0">
                        <div class="specialty-card w-full h-[80px] rounded-[8px] flex flex-col items-center justify-center gap-2">
                            <iconify-icon icon="solar:menu-dots-square-linear" width="20" height="20" class="text-[#1E3A5F]"></iconify-icon>
                            <span class="text-xs font-medium">Other</span>
                        </div>
                    </label>
                </div>
            </div>

            <!-- STEP 4: Referral (Hidden) -->
            <div id="step-4-content" class="step-content hidden">
                <div class="flex justify-between items-baseline mb-8">
                    <h2 class="text-2xl font-semibold tracking-tight">Have a referral code?</h2>
                    <button type="button" class="text-xs font-medium text-[#64748B] hover:text-[#1E3A5F] underline underline-offset-4">Skip</button>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-[#64748B] mb-1.5 ml-1">Referral Code (Optional)</label>
                        <input type="text" class="input-field" placeholder="Enter code">
                    </div>
                </div>
            </div>

            <!-- Navigation Buttons -->
            <div class="mt-12 flex items-center justify-between">
                <div>
                    <button type="button" id="prev-btn" class="hidden text-sm font-medium text-[#64748B] hover:text-[#1E3A5F] transition-colors flex items-center gap-2">
                        <iconify-icon icon="solar:alt-arrow-left-linear" width="16" height="16"></iconify-icon>
                        Back
                    </button>
                </div>
                <button type="button" id="next-btn" class="h-11 px-8 bg-[#1E3A5F] text-white rounded-[8px] text-sm font-medium hover:bg-[#162a45] transition-all shadow-sm">
                    Next
                </button>
            </div>
        </form>
    </div>

    <!-- Legal Footer -->
    <div class="mt-8">
        <p class="text-xs text-[#94A3B8]">
            © 2024 Ivorymade Dental Laboratory. All rights reserved.
        </p>
    </div>

    <script>
        let currentStep = 1;
        const totalSteps = 4;

        const nextBtn = document.getElementById('next-btn');
        const prevBtn = document.getElementById('prev-btn');
        const stepLabel = document.getElementById('step-label');

        function updateUI() {
            // Update Visibility
            document.querySelectorAll('.step-content').forEach((el, idx) => {
                el.classList.toggle('hidden', idx + 1 !== currentStep);
            });

            // Update Dots
            for (let i = 1; i <= totalSteps; i++) {
                const dot = document.getElementById(`dot-${i}`);
                if (i < currentStep) {
                    dot.style.backgroundColor = '#10B981'; // Success
                } else if (i === currentStep) {
                    dot.style.backgroundColor = '#1E3A5F'; // Active
                } else {
                    dot.style.backgroundColor = '#E2E8F0'; // Upcoming
                }
            }

            // Update Label
            stepLabel.innerText = `Step ${currentStep} of ${totalSteps}`;

            // Navigation visibility
            prevBtn.classList.toggle('hidden', currentStep === 1);
            nextBtn.innerText = currentStep === totalSteps ? 'Complete' : 'Next';
        }

        nextBtn.addEventListener('click', () => {
            if (currentStep < totalSteps) {
                currentStep++;
                updateUI();
            } else {
                alert('Onboarding Complete!');
            }
        });

        prevBtn.addEventListener('click', () => {
            if (currentStep > 1) {
                currentStep--;
                updateUI();
            }
        });
    </script>

</body></html>
