<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Verification | Ivorymade</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<style>
body {
font-family: 'Inter', sans-serif;
-webkit-font-smoothing: antialiased;
}
.otp-input:focus {
outline: none;
border-color: #1E3A5F;
box-shadow: 0 0 0 1px #1E3A5F;
}
/* Remove arrows from number input */
input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
-webkit-appearance: none;
margin: 0;
}
.logo-text {
letter-spacing: -0.05em;
}
</style></head>
<body class="bg-[#F8F9FB] text-[#1E293B] min-h-screen flex flex-col items-center justify-center p-6">

    <!-- Logo -->
    <div class="mb-10">
        <span class="logo-text text-2xl font-semibold uppercase flex items-center">
            <span class="text-[#1E3A5F]">Ivory</span>
            <span class="text-[#C9A96E]">made</span>
        </span>
    </div>

    <!-- Main Card -->
    <div class="w-full max-w-[400px] bg-white rounded-[12px] shadow-md p-8">
        
        <!-- Header Section -->
        <div class="flex flex-col items-center text-center mb-8">
            <div class="w-[64px] h-[64px] bg-[#F0F4F8] rounded-full flex items-center justify-center mb-6">
                <iconify-icon icon="solar:letter-linear" width="32" height="32" class="text-[#1E3A5F]" stroke-width="1.5"></iconify-icon>
            </div>
            <h2 class="text-2xl font-semibold tracking-tight text-[#1E293B]">Verify Your Email</h2>
            <p class="text-sm text-[#64748B] mt-2">
                Enter the 6-digit code sent to <span class="text-[#1E293B] font-medium">john@example.com</span>
            </p>
        </div>

        <!-- OTP Input Section -->
        <form id="otp-form" class="space-y-8">
            <div class="flex justify-center gap-3">
                <input type="text" maxlength="1" class="otp-input w-[48px] h-[48px] border border-[#E2E8F0] rounded-[8px] text-center text-2xl font-semibold text-[#1E3A5F] transition-all" autofocus="">
                <input type="text" maxlength="1" class="otp-input w-[48px] h-[48px] border border-[#E2E8F0] rounded-[8px] text-center text-2xl font-semibold text-[#1E3A5F] transition-all">
                <input type="text" maxlength="1" class="otp-input w-[48px] h-[48px] border border-[#E2E8F0] rounded-[8px] text-center text-2xl font-semibold text-[#1E3A5F] transition-all">
                <input type="text" maxlength="1" class="otp-input w-[48px] h-[48px] border border-[#E2E8F0] rounded-[8px] text-center text-2xl font-semibold text-[#1E3A5F] transition-all">
                <input type="text" maxlength="1" class="otp-input w-[48px] h-[48px] border border-[#E2E8F0] rounded-[8px] text-center text-2xl font-semibold text-[#1E3A5F] transition-all">
                <input type="text" maxlength="1" class="otp-input w-[48px] h-[48px] border border-[#E2E8F0] rounded-[8px] text-center text-2xl font-semibold text-[#1E3A5F] transition-all">
            </div>

            <!-- Action Button -->
            <button type="submit" class="w-full h-[44px] bg-[#1E3A5F] hover:bg-[#162a45] text-white text-sm font-medium rounded-[8px] transition-all duration-200 shadow-sm">
                Confirm
            </button>
        </form>

        <!-- Footer Links -->
        <div class="mt-6 text-center">
            <p class="text-sm text-[#64748B]">
                Didn't receive the code? 
                <button class="text-[#1E3A5F] font-medium hover:underline decoration-2 underline-offset-4 ml-1 transition-all">
                    Resend
                </button>
            </p>
        </div>

        <!-- Success Message (Hidden by default) -->
        <div id="success-state" class="hidden mt-6 p-3 bg-emerald-50 border border-emerald-100 rounded-[8px] flex items-center gap-3">
            <iconify-icon icon="solar:check-circle-linear" width="20" height="20" class="text-[#10B981]"></iconify-icon>
            <p class="text-xs text-emerald-700 font-medium">Code verified successfully!</p>
        </div>
    </div>

    <!-- Legal Footer -->
    <div class="mt-8 text-center">
        <p class="text-xs text-[#94A3B8]">
            © 2024 Ivorymade Dental Laboratory. All rights reserved.
        </p>
    </div>

    <script>
        const inputs = document.querySelectorAll('.otp-input');
        
        inputs.forEach((input, index) => {
            // Handle typing
            input.addEventListener('input', (e) => {
                const val = e.target.value;
                if (val.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            // Handle backspace
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });

            // Prevent non-numeric characters
            input.addEventListener('keypress', (e) => {
                if (!/[0-9]/.test(e.key)) {
                    e.preventDefault();
                }
            });
        });

        // Simple mock submission
        document.getElementById('otp-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const successMsg = document.getElementById('success-state');
            successMsg.classList.remove('hidden');
            setTimeout(() => {
                successMsg.classList.add('hidden');
            }, 3000);
        });
    </script>

</body></html>
